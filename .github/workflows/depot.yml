name: operator

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

  pull_request:
    branches:
      - '*'
permissions:
    id-token: write
    contents: read

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-22.04-4
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
          images: |
                ghcr.io/zippiehq/cartesi-coprocessor-operator
          tags: |
                type=semver,pattern={{version}}
                type=ref,event=pr
                type=raw,value=testing,enable=${{ github.ref == format('refs/heads/{0}', 'testing') }}
                type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          labels: |
                org.opencontainers.image.title=Cartesi Coprocessor Operator
                org.opencontainers.image.description=Cartesi Coprocessor Operator

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3 

    - name: Login to Github Container Registry (GHCR)
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: depot/setup-action@v1
    - name: Build and Push Docker Image with Depot
      uses: depot/bake-action@v1
      with:
        depot_token: ${{ secrets.DEPOT_API_TOKEN }}
        depot_project: hs0gfs4l0l
        depot_image: ghcr.io/zippiehq/cartesi-coprocessor-operator
        files: |
          ./docker-bake.hcl
          ./docker-bake.platforms.hcl
            ${{ steps.meta.outputs.bake-file }}
        set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,
            mode=max
        push: true


  manifest:
    name: Create and Push Multi-Architecture Manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Login to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and Push Docker Manifest
        run: |
          docker pull --platform linux/amd64 ${{ env.REGISTRY }}/${{ github.repository }}:amd64-latest
          docker pull --platform linux/arm64 ${{ env.REGISTRY }}/${{ github.repository }}:arm64-latest

          docker manifest create ${{ env.REGISTRY }}/${{ github.repository }}:latest \
            --amend ${{ env.REGISTRY }}/${{ github.repository }}:amd64-latest \
            --amend ${{ env.REGISTRY }}/${{ github.repository }}:arm64-latest

          docker manifest annotate ${{ env.REGISTRY }}/${{ github.repository }}:latest ${{ env.REGISTRY }}/${{ github.repository }}:amd64-latest --arch amd64
          docker manifest annotate ${{ env.REGISTRY }}/${{ github.repository }}:latest ${{ env.REGISTRY }}/${{ github.repository }}:arm64-latest --arch arm64

          docker manifest push ${{ env.REGISTRY }}/${{ github.repository }}:latest


          docker pull --platform linux/amd64 ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}

    env:
      DOCKER_CLI_EXPERIMENTAL: enabled


